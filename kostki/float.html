<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Losowanie Kostki</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
            text-align: center; 
        }

        .container {
            width: 100%;
            overflow: hidden;
            margin-bottom: 20px;
            scale: 70%;
        }

        .box {
            width: 30%;
            float: left; 
            margin: 1.66%; 
            box-sizing: border-box; 
            padding: 20px;
            background-color: #ffffff;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center; 
        }

        .box img {
            width: 50px;
            height: 50px;
        }

        .button-container {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .result {
            font-size: 18px;
            margin-top: 20px;
            padding: 10px;
            background-color: #ffffff;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: inline-block; 
        }

        /* Czyszczenie float */
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

    <h1>Losowanie Kostki</h1>
    <div class="container clearfix">
        <div class="box" id="kostka1">
            <img src="kostka1.png" alt="Kostka 1">
            <p>Kostka 1</p>
        </div>
        <div class="box" id="kostka2">
            <img src="kostka2.png" alt="Kostka 2">
            <p>Kostka 2</p>
        </div>
        <div class="box" id="kostka3">
            <img src="kostka3.png" alt="Kostka 3">
            <p>Kostka 3</p>
        </div>
        <div class="box" id="kostka4">
            <img src="kostka4.png" alt="Kostka 4">
            <p>Kostka 4</p>
        </div>
        <div class="box" id="kostka5">
            <img src="kostka5.png" alt="Kostka 5">
            <p>Kostka 5</p>
        </div>
        <div class="box" id="kostka6">
            <img src="kostka6.png" alt="Kostka 6">
            <p>Kostka 6</p>
        </div>
    </div>

    <div class="button-container">
        <button id="losujBtn">Losuj</button>
        <button id="resetBtn">Resetuj</button>
    </div>

    <div class="result" id="wynik">Suma</div>

    <script>
        const wynikElement = document.getElementById('wynik');
        const losujBtn = document.getElementById('losujBtn');
        const resetBtn = document.getElementById('resetBtn');
        let sumaOczek = 0;
        let liczbaLosowan = 0;

        losujBtn.addEventListener('click', () => {
            const wylosowanaLiczba = Math.floor(Math.random() * 6) + 1;
            sumaOczek += wylosowanaLiczba;
            liczbaLosowan++;

            wynikElement.textContent = `Wylosowano: Kostka ${wylosowanaLiczba} (wartość: ${wylosowanaLiczba}). 
                Suma wyrzuconych oczek: ${sumaOczek}. 
                Liczba losowań: ${liczbaLosowan}.`;
        });

        resetBtn.addEventListener('click', () => {
            sumaOczek = 0;
            liczbaLosowan = 0;
            wynikElement.textContent = 'Suma';
        });
    </script>

</body>
</html>
